version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: nest_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nest_assignment
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: nest_rabbitmq
    restart: always
    ports:
      - '5672:5672'
      - '15672:15672'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_api
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - rabbitmq
    env_file:
      - .env

volumes:
  postgres_data:
